name: P1-E2A Debug

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-capture:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/core-api
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Capture backend test result
        shell: bash
        run: |
          set +e
          mvn -B test > "$RUNNER_TEMP/p1e2a-backend.log" 2>&1
          status=$?
          set -e
          printf '%s\n' "$status" > "$RUNNER_TEMP/p1e2a-status.txt"
      - name: Upload bounded diagnostic input
        uses: actions/upload-artifact@v4
        with:
          name: p1e2a-debug-log
          path: |
            ${{ runner.temp }}/p1e2a-backend.log
            ${{ runner.temp }}/p1e2a-status.txt
          retention-days: 1
      - name: Preserve backend test conclusion
        shell: bash
        run: exit "$(cat "$RUNNER_TEMP/p1e2a-status.txt")"

  failure-summary:
    needs: backend-capture
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: p1e2a-debug-log
          path: diagnostic
      - name: Print concise failure summary
        shell: bash
        run: |
          status="$(cat diagnostic/p1e2a-status.txt)"
          echo "backend-test-exit=$status"
          if [[ "$status" -ne 0 ]]; then
            grep -E "(^|[[:space:]])(ERROR|FAILURE|Failures:|Errors:|Tests run:|Caused by:|APPLICATION FAILED|expected:|but was:|NoSuchBeanDefinition|BeanDefinition|UnsatisfiedDependency|IllegalStateException|AssertionFailedError)" \
              diagnostic/p1e2a-backend.log | tail -n 80 || true
          else
            tail -n 10 diagnostic/p1e2a-backend.log
          fi
