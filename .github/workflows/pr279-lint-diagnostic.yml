name: PR279 Lint Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-diagnostic:
    if: github.event.pull_request.number == 279
    runs-on: ubuntu-24.04
    steps:
      - name: Fetch exact PR head and print lint errors
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git init -q .
          git remote add origin "https://github.com/${REPOSITORY}.git"
          git fetch -q --depth=1 origin "${HEAD_SHA}"
          git checkout -q FETCH_HEAD
          cd apps/web-dashboard
          npm ci --silent
          npm run lint
