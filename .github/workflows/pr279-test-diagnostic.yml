name: PR279 Test Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-diagnostic:
    if: github.event.pull_request.number == 279
    runs-on: ubuntu-24.04
    steps:
      - name: Fetch exact PR head and print failing test context
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git init -q .
          git remote add origin "https://github.com/${REPOSITORY}.git"
          git fetch -q --depth=1 origin "${HEAD_SHA}"
          git checkout -q FETCH_HEAD
          cd apps/web-dashboard
          npm ci --silent
          set +e
          output="$(npm test 2>&1)"
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            printf '%s\n' "$output" | grep -E -C 10 'not ok|AssertionError|ERR_|error:|failureType|expected|actual' | tail -n 70 || true
            exit "$status"
          fi
