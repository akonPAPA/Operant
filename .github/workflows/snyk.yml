name: Snyk Dependency Scan

on:
  pull_request:
    paths:
      - "apps/web-dashboard/package.json"
      - "apps/web-dashboard/package-lock.json"
      - "apps/core-api/pom.xml"
      - ".github/workflows/snyk.yml"
  push:
    branches:
      - main
    paths:
      - "apps/web-dashboard/package.json"
      - "apps/web-dashboard/package-lock.json"
      - "apps/core-api/pom.xml"
      - ".github/workflows/snyk.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: snyk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snyk-web-dashboard:
    name: Snyk Open Source - web-dashboard
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    defaults:
      run:
        working-directory: apps/web-dashboard

    steps:
      - name: Explain missing Snyk credentials
        if: env.SNYK_TOKEN == ''
        working-directory: .
        run: |
          echo "::notice::SNYK_TOKEN is not available; the web-dashboard dependency scan was skipped."
          echo "### Snyk web-dashboard scan skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "SNYK_TOKEN is not available to this run. This is expected for untrusted fork pull requests." >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout
        if: env.SNYK_TOKEN != ''
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        if: env.SNYK_TOKEN != ''
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"
          cache: "npm"
          cache-dependency-path: apps/web-dashboard/package-lock.json

      - name: Install dependencies
        if: env.SNYK_TOKEN != ''
        run: npm ci

      - name: Install pinned Snyk CLI
        if: env.SNYK_TOKEN != ''
        run: npm install --global snyk@1.1305.2

      - name: Report all dependency findings
        if: env.SNYK_TOKEN != ''
        shell: bash
        run: |
          set +e
          snyk test --severity-threshold=low
          snyk_exit=$?
          set -e
          if [ "$snyk_exit" -eq 1 ]; then
            echo "::notice::Snyk findings were reported; high/critical enforcement runs next."
            exit 0
          fi
          exit "$snyk_exit"

      - name: Block on high or critical dependency findings
        if: env.SNYK_TOKEN != ''
        run: snyk test --severity-threshold=high

  snyk-core-api:
    name: Snyk Open Source - core-api
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    defaults:
      run:
        working-directory: apps/core-api

    steps:
      - name: Explain missing Snyk credentials
        if: env.SNYK_TOKEN == ''
        working-directory: .
        run: |
          echo "::notice::SNYK_TOKEN is not available; the core-api dependency scan was skipped."
          echo "### Snyk core-api scan skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "SNYK_TOKEN is not available to this run. This is expected for untrusted fork pull requests." >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout
        if: env.SNYK_TOKEN != ''
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Java
        if: env.SNYK_TOKEN != ''
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: Setup Node for Snyk CLI
        if: env.SNYK_TOKEN != ''
        uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"

      - name: Install pinned Snyk CLI
        if: env.SNYK_TOKEN != ''
        run: npm install --global snyk@1.1305.2

      - name: Report all dependency findings
        if: env.SNYK_TOKEN != ''
        shell: bash
        run: |
          set +e
          snyk test --file=pom.xml --severity-threshold=low
          snyk_exit=$?
          set -e
          if [ "$snyk_exit" -eq 1 ]; then
            echo "::notice::Snyk findings were reported; high/critical enforcement runs next."
            exit 0
          fi
          exit "$snyk_exit"

      - name: Block on high or critical dependency findings
        if: env.SNYK_TOKEN != ''
        run: snyk test --file=pom.xml --severity-threshold=high
