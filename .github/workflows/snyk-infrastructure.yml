name: Snyk Security Scan

on:
  pull_request:
    paths:
      - "apps/web-dashboard/package.json"
      - "apps/web-dashboard/package-lock.json"
      - "apps/core-api/pom.xml"
      - ".github/workflows/snyk-security.yml"
  push:
    branches:
      - main
      - fixes-29
    paths:
      - "apps/web-dashboard/package.json"
      - "apps/web-dashboard/package-lock.json"
      - "apps/core-api/pom.xml"
      - ".github/workflows/snyk-security.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snyk-web-dashboard:
    name: Snyk Open Source - web-dashboard
    runs-on: ubuntu-latest
    continue-on-error: true

    defaults:
      run:
        working-directory: apps/web-dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --severity-threshold=high

  snyk-core-api:
    name: Snyk Open Source - core-api
    runs-on: ubuntu-latest
    continue-on-error: true

    defaults:
      run:
        working-directory: apps/core-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=pom.xml --severity-threshold=high
