name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stage-11c-acceptance-preflight:
    name: Stage 11C acceptance preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Core v1 acceptance preflight
        shell: pwsh
        run: ./scripts/test-core-v1-acceptance.ps1 -OutputPath "${{ runner.temp }}/CORE_V1_ACCEPTANCE_EVIDENCE.md"

  docker-compose-config:
    name: Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate local Docker Compose config
        run: docker compose -f infra/docker/docker-compose.yml config

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      SPRING_PROFILES_ACTIVE: test
    defaults:
      run:
        working-directory: apps/core-api
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend tests
        run: mvn test "-Dtest=!*IntegrationTest"

  operantctl:
    name: operantctl tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/operantctl
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and verify operantctl (packaged shaded JAR + full tests)
        run: mvn --batch-mode --no-transfer-progress clean verify

      - name: Verify executable artifact starts
        run: java -jar target/operantctl-0.1.0-SNAPSHOT.jar version

      - name: Packaged behavioural smoke
        run: bash scripts/packaged-smoke.sh

  core-api-release-docker-guard:
    name: Core API release Docker guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate core-api Dockerfile test gate
        shell: pwsh
        run: ./scripts/check-core-api-release-dockerfile.ps1

      - name: Build test-gated core-api release image
        run: docker build -f apps/core-api/Dockerfile .
