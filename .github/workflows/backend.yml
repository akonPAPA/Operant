name: Backend

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend-integration-tests:
    runs-on: ubuntu-latest
    environment: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: orderpilot_test
          POSTGRES_USER: orderpilot_test
          POSTGRES_PASSWORD: orderpilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orderpilot_test -d orderpilot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn clean test
