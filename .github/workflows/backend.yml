name: Backend
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-integration-tests:
    runs-on: ubuntu-latest
    env:
      SPRING_PROFILES_ACTIVE: integration-test
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/orderpilot_test
      SPRING_DATASOURCE_USERNAME: orderpilot_test
      SPRING_DATASOURCE_PASSWORD: orderpilot_test
    defaults:
      run:
        working-directory: apps/core-api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: orderpilot_test
          POSTGRES_USER: orderpilot_test
          POSTGRES_PASSWORD: orderpilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orderpilot_test -d orderpilot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      # RequiresPostgresIntegration / DatabaseIntegrationTestBase gate on this
      # system property. Without it the job is a false-green (45 skipped).
      - run: >-
          mvn test
          "-Dspring.profiles.active=integration-test"
          "-Dorderpilot.postgres.integration.enabled=true"
          "-Dtest=*IntegrationTest"
