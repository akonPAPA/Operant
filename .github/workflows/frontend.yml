name: Frontend

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$base" "$head")"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(apps/web-dashboard/|apps/web-dashboard/package\.json$|apps/web-dashboard/package-lock\.json$|docs/production/RELEASE_EVIDENCE_MANIFEST\.md$|docs/security/(TRUSTED_GATEWAY_HEADER_BOUNDARY\.md|gateway-header-strip-nginx-example\.conf)$|scripts/check-evidence-integrity(\.test)?\.mjs$|\.github/workflows/frontend\.yml$)'; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-dashboard
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"
          cache: npm
          cache-dependency-path: apps/web-dashboard/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - run: npm run validate:p1d-topology
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run Playwright BFF E2E
        run: npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-bff-report
          path: |
            apps/web-dashboard/playwright-report/
            apps/web-dashboard/test-results/
          if-no-files-found: ignore


  release-evidence:
    name: Release Evidence Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22.18.0"
      - name: Validate tracked release evidence policy
        run: node scripts/check-evidence-integrity.mjs --mode structural
      - name: Run release evidence checker tests
        run: node --test scripts/check-evidence-integrity.test.mjs
  # Skip-safe required gate: "Frontend / Frontend Gate".
  # This job MUST always run and reach a terminal success/failure conclusion so it is
  # never reported as skipped/neutral. When there are no frontend changes it satisfies
  # the required check with a no-op step; when frontend changes exist it fails unless
  # the real build job completed successfully.
  frontend-gate:
    name: Frontend Gate
    needs:
      - changes
      - build
      - release-evidence
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Decide Frontend gate outcome
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "::error::changes job did not succeed; gate cannot determine path relevance safely."
            exit 1
          fi

          if [[ "${{ needs.release-evidence.result }}" != "success" ]]; then
            echo "::error::Release evidence gate did not succeed."
            exit 1
          fi

          if [[ "${{ needs.changes.outputs.frontend }}" != "true" ]]; then
            echo "No frontend changes detected; evidence gate passed; Frontend Gate satisfied (not applicable)."
            exit 0
          fi

          result="${{ needs.build.result }}"
          echo "Frontend build job result: $result"

          if [[ "$result" != "success" ]]; then
            echo "::error::Frontend changes detected but build job did not succeed."
            exit 1
          fi

          echo "Frontend changes detected and build job succeeded; Frontend Gate satisfied."
