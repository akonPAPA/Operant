name: AI Worker

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ai_worker: ${{ steps.filter.outputs.ai_worker }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            echo "ai_worker=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$base" "$head")"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(apps/ai-worker/|apps/ai-worker/pyproject\.toml$|apps/ai-worker/requirements.*\.txt$|\.github/workflows/ai-worker\.yml$)'; then
            echo "ai_worker=true" >> "$GITHUB_OUTPUT"
          else
            echo "ai_worker=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: changes
    if: needs.changes.outputs.ai_worker == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-worker
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/ai-worker/pyproject.toml

      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest

  # Skip-safe required gate: "AI Worker / AI Worker Gate".
  # This job MUST always run and reach a terminal success/failure conclusion so it is
  # never reported as skipped/neutral. When there are no AI Worker changes it satisfies
  # the required check with a no-op step; when AI Worker changes exist it fails unless
  # the real pytest job completed successfully.
  ai-worker-gate:
    name: AI Worker Gate
    needs:
      - changes
      - test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Decide AI Worker gate outcome
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "::error::changes job did not succeed; gate cannot determine path relevance safely."
            exit 1
          fi

          if [[ "${{ needs.changes.outputs.ai_worker }}" != "true" ]]; then
            echo "No AI Worker changes detected; AI Worker Gate satisfied (not applicable)."
            exit 0
          fi

          result="${{ needs.test.result }}"
          echo "AI Worker test job result: $result"

          if [[ "$result" != "success" ]]; then
            echo "::error::AI Worker changes detected but test job did not succeed."
            exit 1
          fi

          echo "AI Worker changes detected and test job succeeded; AI Worker Gate satisfied."
