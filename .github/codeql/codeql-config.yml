name: "OrderPilot CodeQL config"


disable-default-queries: false


queries:
  - uses: security-extended
  - uses: security-and-quality


paths:
  - apps/core-api/src
  - apps/web-dashboard
  - apps/ai-worker
  - .github/workflows

paths-ignore:
  - "**/node_modules/**"
  - "**/.next/**"
  - "**/target/**"
  - "**/.venv/**"
  - "**/__pycache__/**"
  - "**/*.pyc"
  - "**/coverage/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/out/**"
  - "**/.turbo/**"
  - "**/reports/**"
  - "**/surefire-reports/**"
  - "**/failsafe-reports/**"
  - "**/*.generated.*"
  - "**/generated/**"
  - "**/*.min.js"
