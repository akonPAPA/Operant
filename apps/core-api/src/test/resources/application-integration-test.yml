spring:
  test:
    database:
      replace: none
  datasource:
    url: "${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${ORDERPILOT_TEST_DB_HOST_PORT:${ORDERPILOT_DB_HOST_PORT:15432}}/${ORDERPILOT_TEST_DB_NAME:orderpilot_test}}"
    username: "${SPRING_DATASOURCE_USERNAME:${ORDERPILOT_TEST_DB_USER:${ORDERPILOT_DB_USER:orderpilot_local_user}}}"
    password: "${SPRING_DATASOURCE_PASSWORD:${ORDERPILOT_TEST_DB_PASSWORD:${ORDERPILOT_DB_PASSWORD:change-me-local-dev-only}}}"
  flyway:
    enabled: true
    clean-disabled: true
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  sql:
    init:
      mode: never

logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: off

orderpilot:
  external-execution:
    enabled: false
  connectors:
    execution-enabled: false
  bot:
    outbound-enabled: false
  test-database:
    name: ${ORDERPILOT_TEST_DB_NAME:orderpilot_test}
    externalExecution: DISABLED
