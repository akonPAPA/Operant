# yaml-language-server: $schema=https://json.schemastore.org/spring-boot
spring:
  application:
    name: orderpilot-core-api
  datasource:
    url: "${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${ORDERPILOT_DB_HOST_PORT:55432}/${ORDERPILOT_DB_NAME:orderpilot_local}}"
    username: "${SPRING_DATASOURCE_USERNAME:${ORDERPILOT_DB_USER:orderpilot_local_user}}"
    password: "${SPRING_DATASOURCE_PASSWORD:${ORDERPILOT_DB_PASSWORD:change-me-local-dev-only}}"
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
server:
  port: ${SERVER_PORT:8080}
management:
  endpoints:
    web:
      exposure:
        include: health,info
orderpilot:
  tenant:
    header-name: X-Tenant-Id
