# yaml-language-server: $schema=https://json.schemastore.org/spring-boot
spring:
  application:
    name: orderpilot-core-api
  # OP-CAP-16K: never auto-create a Redis connection. Redis is used only for distributed runtime
  # rate counters and is wired explicitly (and conditionally) by RuntimeRateRedisConfiguration when
  # orderpilot.runtime.rate.store=redis. Excluding the auto-configuration keeps the actuator Redis
  # health indicator and a localhost connection factory from activating when Redis is not selected.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: "${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${ORDERPILOT_DB_HOST_PORT:15432}/${ORDERPILOT_DB_NAME:orderpilot_local}}"
    username: "${SPRING_DATASOURCE_USERNAME:${ORDERPILOT_DB_USER:orderpilot_local_user}}"
    password: "${SPRING_DATASOURCE_PASSWORD:${ORDERPILOT_DB_PASSWORD:change-me-local-dev-only}}"
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
server:
  port: ${SERVER_PORT:8080}
management:
  endpoints:
    web:
      exposure:
        include: health,info
orderpilot:
  tenant:
    header-name: X-Tenant-Id
  security:
    cors:
      allowed-origins: "${ORDERPILOT_CORS_ALLOWED_ORIGINS:}"
    gateway-header-auth:
      # Disabled by default so client-supplied permission headers do not authenticate a public request.
      # Trusted gateway deployments may enable this only when the gateway strips inbound client copies.
      enabled: "${ORDERPILOT_GATEWAY_HEADER_AUTH_ENABLED:false}"
      # Enabled gateway-header auth must fail closed unless a trusted gateway signs the authority
      # headers with this shared secret. Tests/dev may explicitly set signature-required=false.
      signature-required: "${ORDERPILOT_GATEWAY_HEADER_AUTH_SIGNATURE_REQUIRED:true}"
      shared-secret: "${ORDERPILOT_GATEWAY_HEADER_AUTH_SHARED_SECRET:}"
      clock-skew-seconds: "${ORDERPILOT_GATEWAY_HEADER_AUTH_CLOCK_SKEW_SECONDS:300}"
      # memory (default, single-node/dev/test) | redis (distributed nonce admission across instances).
      replay-store: "${ORDERPILOT_GATEWAY_HEADER_AUTH_REPLAY_STORE:memory}"
      # Production-like signed gateway-header auth fails startup on memory replay admission unless this
      # is deliberately enabled for a documented single-instance deployment.
      allow-single-instance-replay-store-in-production: "${ORDERPILOT_GATEWAY_HEADER_AUTH_ALLOW_SINGLE_INSTANCE_REPLAY_STORE_IN_PRODUCTION:false}"
      redis:
        host: "${ORDERPILOT_GATEWAY_HEADER_AUTH_REDIS_HOST:localhost}"
        port: "${ORDERPILOT_GATEWAY_HEADER_AUTH_REDIS_PORT:6379}"
        key-prefix: "${ORDERPILOT_GATEWAY_HEADER_AUTH_REDIS_KEY_PREFIX:op:gw-replay}"
    # OP-CAP-16K signed actor verification for runtime entitlement admin mutations. Empty = no
    # signing secret configured → local/dev trusted-header fallback (16J behavior). When set, admin
    # mutations require a valid X-OrderPilot-Actor-Signature over (tenantId\nactorId\ntimestamp).
    actor-signing-secret: "${ORDERPILOT_ACTOR_SIGNING_SECRET:}"
    actor-signature-max-skew-seconds: 300
  runtime-control:
    enabled: "${ORDERPILOT_RUNTIME_CONTROL_ENABLED:true}"
    default-ai-enabled: "${ORDERPILOT_RUNTIME_CONTROL_DEFAULT_AI_ENABLED:true}"
    default-max-cost-units-per-request: "${ORDERPILOT_RUNTIME_CONTROL_DEFAULT_MAX_COST_UNITS_PER_REQUEST:10000}"
    default-daily-cost-units-per-tenant: "${ORDERPILOT_RUNTIME_CONTROL_DEFAULT_DAILY_COST_UNITS_PER_TENANT:100000}"
    default-max-sync-cost-units: "${ORDERPILOT_RUNTIME_CONTROL_DEFAULT_MAX_SYNC_COST_UNITS:100}"
    default-backpressure-queue-depth: "${ORDERPILOT_RUNTIME_CONTROL_DEFAULT_BACKPRESSURE_QUEUE_DEPTH:1000}"
  runtime:
    # OP-CAP-25: controlled Order Journey projection drain. Disabled by default — the runtime stays on
    # explicit/manual projection processing (OP-CAP-23) and the bounded current-tenant drain endpoint until
    # this is turned on. When enabled=true a single config-gated, fixed-delay Spring scheduled task drains a
    # clamped number of tenants/events per cycle through the existing projector runner. No daemon, no queue,
    # no new infrastructure. Limits are clamped in code even if configured too high.
    order-journey-projection:
      enabled: "${ORDERPILOT_ORDER_JOURNEY_DRAIN_ENABLED:false}"
      batch-size: "${ORDERPILOT_ORDER_JOURNEY_DRAIN_BATCH_SIZE:25}"
      max-tenants-per-cycle: "${ORDERPILOT_ORDER_JOURNEY_DRAIN_MAX_TENANTS:10}"
      fixed-delay-ms: "${ORDERPILOT_ORDER_JOURNEY_DRAIN_FIXED_DELAY_MS:30000}"
      recovery-stale-processing-seconds: "${ORDERPILOT_ORDER_JOURNEY_RECOVERY_STALE_PROCESSING_SECONDS:900}"
    rate:
      # in-memory (default, single-node/dev/test) | redis (distributed counters across instances)
      store: "${ORDERPILOT_RUNTIME_RATE_STORE:in-memory}"
      redis:
        host: "${ORDERPILOT_RUNTIME_RATE_REDIS_HOST:localhost}"
        port: "${ORDERPILOT_RUNTIME_RATE_REDIS_PORT:6379}"
        key-prefix: "${ORDERPILOT_RUNTIME_RATE_REDIS_KEY_PREFIX:orderpilot:runtime-rate}"
        # fail-closed by default: if Redis is unavailable, deny (429) rather than allow unmetered.
        fail-open: "${ORDERPILOT_RUNTIME_RATE_REDIS_FAIL_OPEN:false}"
