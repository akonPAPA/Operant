# yaml-language-server: $schema=https://json.schemastore.org/spring-boot
spring:
  application:
    name: orderpilot-core-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/orderpilot}
    username: ${SPRING_DATASOURCE_USERNAME:orderpilot_app}
    password: ${SPRING_DATASOURCE_PASSWORD:orderpilot_local_password}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
server:
  port: ${SERVER_PORT:8080}
management:
  endpoints:
    web:
      exposure:
        include: health,info
orderpilot:
  tenant:
    header-name: X-Tenant-Id