services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${ORDERPILOT_DB_NAME}
      POSTGRES_USER: ${ORDERPILOT_DB_USER}
      POSTGRES_PASSWORD: ${ORDERPILOT_DB_PASSWORD}
    volumes:
      - operant_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [operant_internal]
    deploy:
      resources:
        limits:
          memory: 1g

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [operant_internal]
    deploy:
      resources:
        limits:
          memory: 256m

  core-api:
    build:
      context: ../..
      dockerfile: apps/core-api/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod,production
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${ORDERPILOT_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${ORDERPILOT_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${ORDERPILOT_DB_PASSWORD}
      ORDERPILOT_GATEWAY_HEADER_AUTH_ENABLED: "true"
      ORDERPILOT_GATEWAY_HEADER_AUTH_SIGNATURE_REQUIRED: "true"
      ORDERPILOT_GATEWAY_HEADER_AUTH_SHARED_SECRET: ${ORDERPILOT_GATEWAY_HEADER_AUTH_SHARED_SECRET}
      ORDERPILOT_GATEWAY_HEADER_AUTH_REPLAY_STORE: redis
      ORDERPILOT_GATEWAY_HEADER_AUTH_REDIS_HOST: redis
      ORDERPILOT_ACTOR_SIGNING_SECRET: ${ORDERPILOT_ACTOR_SIGNING_SECRET}
      ORDERPILOT_PUBLIC_API_BASE_URL: ${ORDERPILOT_PUBLIC_API_BASE_URL}
      ORDERPILOT_PUBLIC_WEB_BASE_URL: ${ORDERPILOT_PUBLIC_WEB_BASE_URL}
      ORDERPILOT_CORS_ALLOWED_ORIGINS: ${ORDERPILOT_CORS_ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [operant_internal]
    read_only: true
    tmpfs: [/tmp]
    user: app
    deploy:
      resources:
        limits:
          memory: 2g
    # No ports: — not reachable from host/public internet

  web-dashboard:
    build:
      context: ../../apps/web-dashboard
    environment:
      NODE_ENV: production
      ORDERPILOT_BFF_ENABLED: "true"
      CORE_API_BASE_URL: http://core-api:8080
      ORDERPILOT_BFF_SESSION_SECRET: ${ORDERPILOT_BFF_SESSION_SECRET}
      ORDERPILOT_GATEWAY_HEADER_AUTH_SHARED_SECRET: ${ORDERPILOT_GATEWAY_HEADER_AUTH_SHARED_SECRET}
      ORDERPILOT_OIDC_ISSUER: ${ORDERPILOT_OIDC_ISSUER:-}
      ORDERPILOT_OIDC_CLIENT_ID: ${ORDERPILOT_OIDC_CLIENT_ID:-}
      ORDERPILOT_OIDC_CLIENT_SECRET: ${ORDERPILOT_OIDC_CLIENT_SECRET:-}
      ORDERPILOT_OIDC_REDIRECT_URI: ${ORDERPILOT_OIDC_REDIRECT_URI:-}
    depends_on:
      - core-api
    ports:
      - "${OPERANT_WEB_PORT:-443}:3000"
    networks: [operant_internal, operant_edge]
    deploy:
      resources:
        limits:
          memory: 1g

networks:
  operant_internal:
    internal: true
  operant_edge: {}

volumes:
  operant_postgres:
