services:
  ingress:
    build:
      context: ../nginx
      dockerfile: Dockerfile
    container_name: operant-ingress
    restart: unless-stopped
    depends_on:
      web-dashboard:
        condition: service_healthy
    environment:
      OPERANT_PUBLIC_HOST: ${OPERANT_PUBLIC_HOST:?set OPERANT_PUBLIC_HOST}
    ports:
      - "${OPERANT_HTTP_PORT:-80}:8080"
      - "${OPERANT_HTTPS_PORT:-443}:8443"
    networks:
      - public_edge
    secrets:
      - operant_tls_cert
      - operant_tls_key
    read_only: true
    tmpfs:
      - /etc/nginx/conf.d:rw,noexec,nosuid,nodev,size=1m
      - /var/cache/nginx:rw,noexec,nosuid,nodev,size=16m
      - /var/run:rw,noexec,nosuid,nodev,size=1m
      - /tmp:rw,noexec,nosuid,nodev,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 128m
    cpus: 0.25
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  web-dashboard:
    container_name: operant-web-dashboard
    build:
      context: ../../apps/web-dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      core-api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      ORDERPILOT_DEPLOY_PROFILE: production
      ORDERPILOT_BFF_ENABLED: "true"
      ORDERPILOT_BFF_SESSION_STORE: redis
      ORDERPILOT_BFF_REDIS_URL: redis://:${ORDERPILOT_REDIS_PASSWORD:?set ORDERPILOT_REDIS_PASSWORD}@redis:6379
      ORDERPILOT_PUBLIC_ORIGIN: https://${OPERANT_PUBLIC_HOST:?set OPERANT_PUBLIC_HOST}
      CORE_API_BASE_URL: http://core-api:8080
      ORDERPILOT_GATEWAY_SHARED_SECRET: ${ORDERPILOT_GATEWAY_SHARED_SECRET:?set ORDERPILOT_GATEWAY_SHARED_SECRET}
      ORDERPILOT_OIDC_ENABLED: "true"
      ORDERPILOT_OIDC_ISSUER: ${ORDERPILOT_OIDC_ISSUER:?set ORDERPILOT_OIDC_ISSUER}
      ORDERPILOT_OIDC_CLIENT_ID: ${ORDERPILOT_OIDC_CLIENT_ID:?set ORDERPILOT_OIDC_CLIENT_ID}
      ORDERPILOT_OIDC_CLIENT_SECRET: ${ORDERPILOT_OIDC_CLIENT_SECRET:?set ORDERPILOT_OIDC_CLIENT_SECRET}
      ORDERPILOT_OIDC_REDIRECT_URI: https://${OPERANT_PUBLIC_HOST:?set OPERANT_PUBLIC_HOST}/api/auth/oidc/callback
      ORDERPILOT_OIDC_POST_LOGOUT_REDIRECT_URI: https://${OPERANT_PUBLIC_HOST:?set OPERANT_PUBLIC_HOST}/login
      ORDERPILOT_OIDC_SCOPES: ${ORDERPILOT_OIDC_SCOPES:-openid profile email}
      ORDERPILOT_OIDC_CLIENT_AUTHENTICATION_METHOD: CLIENT_SECRET_BASIC
      ORDERPILOT_OIDC_IDENTITY_MAPPINGS_JSON: ${ORDERPILOT_OIDC_IDENTITY_MAPPINGS_JSON:?set ORDERPILOT_OIDC_IDENTITY_MAPPINGS_JSON}
      ORDERPILOT_BFF_UPSTREAM_TIMEOUT_MS: ${ORDERPILOT_BFF_UPSTREAM_TIMEOUT_MS:-30000}
      ORDERPILOT_BFF_SESSION_MAX_AGE_SECONDS: ${ORDERPILOT_BFF_SESSION_MAX_AGE_SECONDS:-3600}
    expose:
      - "3000"
    networks:
      - public_edge
      - application_private
      - data_private
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"
    pids_limit: 256
    mem_limit: 512m
    cpus: 0.75
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/bff/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  core-api:
    container_name: operant-core-api
    build:
      context: ../..
      dockerfile: apps/core-api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: production
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${ORDERPILOT_DB_NAME:?set ORDERPILOT_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${ORDERPILOT_DB_USER:?set ORDERPILOT_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${ORDERPILOT_DB_PASSWORD:?set ORDERPILOT_DB_PASSWORD}
      ORDERPILOT_PUBLIC_API_BASE_URL: https://${OPERANT_PUBLIC_HOST:?set OPERANT_PUBLIC_HOST}
      ORDERPILOT_PUBLIC_WEB_BASE_URL: https://${OPERANT_PUBLIC_HOST:?set OPERANT_PUBLIC_HOST}
      ORDERPILOT_CORS_ALLOWED_ORIGINS: https://${OPERANT_PUBLIC_HOST:?set OPERANT_PUBLIC_HOST}
      ORDERPILOT_GATEWAY_HEADER_AUTH_ENABLED: "true"
      ORDERPILOT_GATEWAY_HEADER_AUTH_SIGNATURE_REQUIRED: "true"
      ORDERPILOT_GATEWAY_SHARED_SECRET: ${ORDERPILOT_GATEWAY_SHARED_SECRET:?set ORDERPILOT_GATEWAY_SHARED_SECRET}
      ORDERPILOT_GATEWAY_HEADER_AUTH_REPLAY_STORE: redis
      ORDERPILOT_GATEWAY_HEADER_AUTH_REDIS_HOST: redis
      ORDERPILOT_GATEWAY_HEADER_AUTH_REDIS_PORT: 6379
      ORDERPILOT_GATEWAY_HEADER_AUTH_REDIS_PASSWORD: ${ORDERPILOT_REDIS_PASSWORD:?set ORDERPILOT_REDIS_PASSWORD}
      ORDERPILOT_ACTOR_SIGNING_SECRET: ${ORDERPILOT_ACTOR_SIGNING_SECRET:?set ORDERPILOT_ACTOR_SIGNING_SECRET}
      ORDERPILOT_DEMO_RFQ_HANDOFF_ENABLED: "false"
      ORDERPILOT_OIDC_ENABLED: "false"
      ORDERPILOT_RUNTIME_RATE_STORE: in-memory
    expose:
      - "8080"
    networks:
      - application_private
      - data_private
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=128m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "10001:10001"
    pids_limit: 512
    mem_limit: 1g
    cpus: 1.0
    stop_grace_period: 45s
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/v1/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  postgres:
    image: postgres:16-alpine
    container_name: operant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ORDERPILOT_DB_NAME:?set ORDERPILOT_DB_NAME}
      POSTGRES_USER: ${ORDERPILOT_DB_USER:?set ORDERPILOT_DB_USER}
      POSTGRES_PASSWORD: ${ORDERPILOT_DB_PASSWORD:?set ORDERPILOT_DB_PASSWORD}
    volumes:
      - operant_postgres_data:/var/lib/postgresql/data
    networks:
      - data_private
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=$${POSTGRES_PASSWORD} pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -h 127.0.0.1 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: operant-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${ORDERPILOT_REDIS_PASSWORD:?set ORDERPILOT_REDIS_PASSWORD}
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    volumes:
      - operant_redis_data:/data
    networks:
      - data_private
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$${REDIS_PASSWORD} redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  public_edge:
    driver: bridge
  application_private:
    driver: bridge
    internal: true
  data_private:
    driver: bridge
    internal: true

volumes:
  operant_postgres_data:
  operant_redis_data:

secrets:
  operant_tls_cert:
    file: ${OPERANT_TLS_CERT_PATH:?set OPERANT_TLS_CERT_PATH}
  operant_tls_key:
    file: ${OPERANT_TLS_KEY_PATH:?set OPERANT_TLS_KEY_PATH}
