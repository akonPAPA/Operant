services:
  postgres-test:
    image: postgres:16-alpine
    container_name: orderpilot-postgres-test
    environment:
      POSTGRES_DB: ${POSTGRES_TEST_DB:-orderpilot_test}
      POSTGRES_USER: ${POSTGRES_TEST_USER:-orderpilot_test}
      POSTGRES_PASSWORD: ${POSTGRES_TEST_PASSWORD:-orderpilot_test}
    ports:
      - "${POSTGRES_TEST_PORT:-5433}:5432"
    volumes:
      - orderpilot_test_postgres:/var/lib/postgresql/data
      - ./postgres/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis-test:
    image: redis:7-alpine
    container_name: orderpilot-redis-test
    ports:
      - "${REDIS_TEST_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  orderpilot_test_postgres:
