services:
  postgres-test:
    image: postgres:16-alpine
    container_name: orderpilot-postgres-test
    environment:
      POSTGRES_DB: ${ORDERPILOT_TEST_DB_NAME:-orderpilot_test}
      POSTGRES_USER: ${ORDERPILOT_TEST_DB_USER:-orderpilot_local_user}
      POSTGRES_PASSWORD: ${ORDERPILOT_TEST_DB_PASSWORD:-change-me-local-dev-only}
    ports:
      - "${ORDERPILOT_TEST_DB_HOST_PORT:-15432}:5432"
    volumes:
      - orderpilot_test_postgres:/var/lib/postgresql/data
      - ./postgres/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=$${POSTGRES_PASSWORD} psql -U $${POSTGRES_USER} -d $${POSTGRES_DB} -c 'select 1' >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis-test:
    image: redis:7-alpine
    container_name: orderpilot-redis-test
    ports:
      - "${REDIS_TEST_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  orderpilot_test_postgres:
