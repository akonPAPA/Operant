services:
  postgres:
    image: postgres:16-alpine
    container_name: orderpilot-postgres
    environment:
      POSTGRES_DB: ${ORDERPILOT_DB_NAME:-orderpilot_local}
      POSTGRES_USER: ${ORDERPILOT_DB_USER:-orderpilot_local_user}
      POSTGRES_PASSWORD: ${ORDERPILOT_DB_PASSWORD:-change-me-local-dev-only}
      ORDERPILOT_TEST_DB_NAME: ${ORDERPILOT_TEST_DB_NAME:-orderpilot_test}
      ORDERPILOT_TEST_DB_USER: ${ORDERPILOT_TEST_DB_USER:-orderpilot_local_user}
      ORDERPILOT_TEST_DB_PASSWORD: ${ORDERPILOT_TEST_DB_PASSWORD:-change-me-local-dev-only}
    ports:
      - "${ORDERPILOT_DB_HOST_PORT:-55432}:5432"
    volumes:
      - orderpilot_postgres:/var/lib/postgresql/data
      - ./postgres/init-local-test-db.sh:/docker-entrypoint-initdb.d/20-init-local-test-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=$${POSTGRES_PASSWORD} psql -U $${POSTGRES_USER} -d $${POSTGRES_DB} -c 'select 1' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: orderpilot-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  core-api:
    container_name: orderpilot-core-api
    build:
      context: ../../apps/core-api
    environment:
      ORDERPILOT_DB_NAME: ${ORDERPILOT_DB_NAME:-orderpilot_local}
      ORDERPILOT_DB_USER: ${ORDERPILOT_DB_USER:-orderpilot_local_user}
      ORDERPILOT_DB_PASSWORD: ${ORDERPILOT_DB_PASSWORD:-change-me-local-dev-only}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${ORDERPILOT_DB_NAME:-orderpilot_local}
      SPRING_DATASOURCE_USERNAME: ${ORDERPILOT_DB_USER:-orderpilot_local_user}
      SPRING_DATASOURCE_PASSWORD: ${ORDERPILOT_DB_PASSWORD:-change-me-local-dev-only}
      SERVER_PORT: 8080
    ports:
      - "${CORE_API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web-dashboard:
    container_name: orderpilot-web-dashboard
    build:
      context: ../../apps/web-dashboard
    environment:
      CORE_API_BASE_URL: http://core-api:8080
    ports:
      - "${WEB_DASHBOARD_PORT:-3000}:3000"
    depends_on:
      - core-api

  ai-worker:
    container_name: orderpilot-ai-worker
    build:
      context: ../../apps/ai-worker
    environment:
      AI_WORKER_LOG_LEVEL: ${AI_WORKER_LOG_LEVEL:-INFO}
    depends_on:
      - redis

volumes:
  orderpilot_postgres:
