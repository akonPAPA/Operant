# OP-CAP-43G trusted-gateway header-strip artifact.
#
# Purpose:
# - Public clients may send business intent only.
# - The trusted gateway/auth service resolves tenant, actor, and permissions.
# - Client-supplied OrderPilot authority headers are never forwarded to core-api.
# - Fresh signed authority headers are injected only from the trusted gateway/auth service result.
#
# This is a header-stripping/private-ingress review artifact, not a complete production gateway.
# It deliberately does not compute HMAC signatures in NGINX and does not contain secrets. Because
# the auth_request subrequest below disables request-body forwarding, it cannot sign body-bearing
# mutations that require SHA-256 over the exact forwarded bytes. Body-bearing requests must be signed
# by the existing body-aware BFF/gateway path, or by a future trusted gateway/auth component that
# reads, hashes, signs, and forwards the exact same bytes.
#
# Production topology required:
#   public client -> this trusted gateway boundary -> private core-api upstream
#
# Do not expose core-api directly on a public listener. core-api must be reachable only from the
# trusted gateway/private network.

upstream orderpilot_core_api_private {
  # Private network address only. Do not publish this upstream directly to the internet.
  server core-api:8080;
}

upstream orderpilot_gateway_auth_private {
  # Trusted gateway/auth signer service. It authenticates the request, strips/ignores client-owned
  # authority headers, derives tenant/actor/permissions, creates timestamp/nonce, and signs the
  # backend canonical string.
  server gateway-auth:8080;
}

server {
  listen 443 ssl;
  server_name orderpilot.example.invalid;

  # TLS/certificate directives intentionally omitted. Never place real secrets in this file.

  location / {
    # Ask the trusted gateway/auth service to authenticate and sign this exact request context.
    # The auth service must not trust any inbound X-OrderPilot-* or X-Tenant-Id headers from the
    # public request. Those names are explicitly cleared on the auth subrequest below.
    auth_request /_orderpilot_gateway_auth;

    auth_request_set $op_tenant_id    $upstream_http_x_orderpilot_resolved_tenant_id;
    auth_request_set $op_actor_id     $upstream_http_x_orderpilot_resolved_actor_id;
    auth_request_set $op_permissions  $upstream_http_x_orderpilot_resolved_permissions;
    auth_request_set $op_timestamp    $upstream_http_x_orderpilot_gateway_timestamp;
    auth_request_set $op_nonce        $upstream_http_x_orderpilot_gateway_nonce;
    auth_request_set $op_signature    $upstream_http_x_orderpilot_gateway_signature;
    auth_request_set $op_sig_version  $upstream_http_x_orderpilot_signature_version;
    auth_request_set $op_content_sha  $upstream_http_x_orderpilot_content_sha256;

    # Strongest boundary: do not forward arbitrary public request headers to core-api. Re-add only
    # headers that are intentionally part of the backend contract.
    proxy_pass_request_headers off;

    # Safe transport/context headers.
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id      $request_id;
    proxy_set_header Idempotency-Key   $http_idempotency_key;
    proxy_set_header Content-Type      $content_type;

    # Gateway-owned authority headers. These values come only from auth_request_set variables above,
    # not from client request headers.
    proxy_set_header X-Tenant-Id                       $op_tenant_id;
    proxy_set_header X-OrderPilot-Actor-Id             $op_actor_id;
    proxy_set_header X-OrderPilot-Permissions          $op_permissions;
    proxy_set_header X-OrderPilot-Gateway-Timestamp    $op_timestamp;
    proxy_set_header X-OrderPilot-Gateway-Nonce        $op_nonce;
    proxy_set_header X-OrderPilot-Signature-Version    $op_sig_version;
    proxy_set_header X-OrderPilot-Content-SHA256       $op_content_sha;
    proxy_set_header X-OrderPilot-Gateway-Signature    $op_signature;

    # Legacy/signed-actor authority headers are not public-client inputs. They remain absent unless a
    # future trusted gateway flow explicitly owns and signs them.
    proxy_set_header X-OrderPilot-Actor-Signature "";
    proxy_set_header X-OrderPilot-Actor-Timestamp "";

    proxy_pass http://orderpilot_core_api_private;
  }

  location = /_orderpilot_gateway_auth {
    internal;

    proxy_pass_request_body off;
    proxy_set_header Content-Length "";

    # Clear all currently known OrderPilot authority headers before the auth/signing service sees the
    # subrequest. The auth service must also ignore any new X-OrderPilot-* authority/debug headers by
    # policy; NGINX OSS cannot wildcard-clear arbitrary header names.
    proxy_set_header X-Tenant-Id "";
    proxy_set_header X-OrderPilot-Tenant-Id "";
    proxy_set_header X-OrderPilot-Actor-Id "";
    proxy_set_header X-OrderPilot-Permissions "";
    proxy_set_header X-OrderPilot-Gateway-Timestamp "";
    proxy_set_header X-OrderPilot-Gateway-Nonce "";
    proxy_set_header X-OrderPilot-Signature-Version "";
    proxy_set_header X-OrderPilot-Content-SHA256 "";
    proxy_set_header X-OrderPilot-Gateway-Signature "";
    proxy_set_header X-OrderPilot-Actor-Signature "";
    proxy_set_header X-OrderPilot-Actor-Timestamp "";

    # Pass only request facts available to this empty-body auth subrequest. This reference artifact
    # must not be treated as a complete body-bound mutation signer: BODY_SHA256_HEX is only truthful
    # when the signer has independently read the exact forwarded bytes, or when the forwarded body is
    # empty. The signer must produce ORDERPILOT_GATEWAY_V2 over METHOD, PATH, RAW_QUERY,
    # CONTENT_TYPE, BODY_SHA256_HEX, tenantId, actorId, permissions, timestamp, and nonce.
    proxy_set_header X-Original-Method $request_method;
    proxy_set_header X-Original-URI    $request_uri;
    proxy_set_header X-Original-Content-Type $content_type;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_pass http://orderpilot_gateway_auth_private;
  }
}
